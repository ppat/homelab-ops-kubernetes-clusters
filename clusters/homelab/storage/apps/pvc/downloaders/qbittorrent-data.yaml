---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-data
  namespace: downloaders
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: sc-longhorn-replicated
  resources:
    requests:
      storage: 2Gi
  volumeMode: Filesystem
