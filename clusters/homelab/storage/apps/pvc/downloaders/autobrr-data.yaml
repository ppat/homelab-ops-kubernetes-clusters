---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autobrr-data
  namespace: downloaders
  labels:
    app.kubernetes.io/name: autobrr
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: sc-longhorn-replicated
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
