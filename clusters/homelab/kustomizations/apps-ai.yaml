---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-ai
  namespace: flux-system
spec:
  components:
  - ../../../components/oidc-credentials/openwebui
  - ../../../components/sso
  - ../../../components/db-backups
  dependsOn:
  - name: infra-security-extra
    namespace: flux-system
  - name: infra-storage-core
    namespace: flux-system
  - name: infra-networking-core
    namespace: flux-system
  - name: infra-kubernetes-extra
    namespace: flux-system
  - name: infra-database-core
    namespace: flux-system
  interval: 15m0s
  path: ./apps/subsystems/ai
  prune: true
  sourceRef:
    kind: GitRepository
    name: apps-ai
    namespace: flux-system
  timeout: 2m0s
  wait: true
  postBuild:
    substitute:
      db_bootstrap_database: litellm
      db_bootstrap_owner: litellm
      db_name: litellm-db
      db_namespace: ai
      db_replicas: "3"
      db_storage_class: sc-longhorn-local-non-replicated
      db_storage_size: 10Gi
      db_suffix_current: "v20260722"
      secret_store: bitwarden-secret-manager-store
      # see: https://fluxcd.io/flux/components/kustomize/kustomizations/#post-build-substitution-of-numbers-and-booleans
      quote: '"'
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
  patches:
  # yamllint disable-line rule:indentation
  - patch: |-
      $patch: delete
      kind: HelmRelease
      metadata:
        name: ollama-release
    target:
      kind: HelmRelease
      name: ollama-release
  # yamllint disable-line rule:indentation
  - patch: |
      - op: add
        path: /spec/affinity
        value:
          podAntiAffinityType: required
    target:
      group: postgresql.cnpg.io
      kind: Cluster
  # mcp-playwright (v0.0.78) enforces a Host-header allowlist (DNS-rebinding
  # protection) that defaults to localhost, so LiteLLM's in-cluster requests to
  # http://mcp-playwright.ai.svc.cluster.local:8931/mcp get 403. Add --allowed-hosts
  # for the service FQDN LiteLLM connects to. Interim cluster-side patch; remove once
  # the apps-ai module sets --allowed-hosts itself and is re-pinned.
  # yamllint disable-line rule:indentation
  - patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --allowed-hosts
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: mcp-playwright.ai.svc.cluster.local:8931
    target:
      kind: Deployment
      name: mcp-playwright
      namespace: ai
