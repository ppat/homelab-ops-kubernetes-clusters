---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-services
  namespace: flux-system
spec:
  dependsOn:
  - name: infra-security-core
    namespace: flux-system
  - name: infra-networking-core
    namespace: flux-system
  interval: 15m0s
  path: ./clusters/homelab/services
  prune: true
  sourceRef:
    kind: GitRepository
    name: root
    namespace: flux-system
  timeout: 2m0s
  wait: true
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
